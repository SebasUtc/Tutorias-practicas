
{% load static %}


<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | Sistema</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    
    <style>
        /* Fondo degradado moderno y centrado absoluto */
        body {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center; /* Centrado vertical */
            justify-content: center; /* Centrado horizontal */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        
        /* Estilizado de la tarjeta de Login */
        .login-card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            background-color: #ffffff;
            overflow: hidden;
            transition: transform 0.2s;
        }

        .login-header {
            background: #2563eb; /* Azul brillante moderno */
            color: white;
            padding: 2.5rem 2rem;
            text-align: center;
        }

        .login-header i {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            opacity: 0.9;
        }

        .form-control {
            border-radius: 8px;
            padding: 12px 15px;
            border: 1px solid #cbd5e1;
            background-color: #f8fafc;
        }

        .form-control:focus {
            background-color: #ffffff;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        .btn-login {
            background: #2563eb;
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-login:hover {
            background: #1d4ed8;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-11 col-sm-8 col-md-6 col-lg-4">
            
            <div class="card login-card">
                <div class="login-header">
                    <i class="fas fa-user-shield"></i>
                    <h3 class="font-weight-bold mb-1">¡Bienvenido!</h3>
                    <p class="text-white-50 small mb-0">Ingresa tus credenciales de acceso</p>
                </div>
                
                <div class="card-body p-4">
                    
                    {% if form.errors %}
                        <div class="alert alert-danger py-2 small border-0" style="border-radius: 8px;">
                            <i class="fas fa-exclamation-circle mr-1"></i> Usuario o contraseña inválidos.
                        </div>
                    {% endif %}

                     <form method="post" action="{% url 'login' %}">
                        {% csrf_token %}
                        
                        <div class="form-group">
                            <label class="small font-weight-bold text-secondary">Nombre de usuario</label>
                            <div class="input-group">
                                <div class="input-group-prepend">
                                    <span class="input-group-text bg-transparent border-right-0 text-muted" style="border-radius: 8px 0 0 8px;"><i class="fas fa-user"></i></span>
                                </div>
                                <input type="text" name="username" class="form-control border-left-0" placeholder="Tu usuario" style="border-radius: 0 8px 8px 0;" required>
                            </div>
                        </div>

                        <div class="form-group mb-4">
                            <label class="small font-weight-bold text-secondary">Contraseña</label>
                            <div class="input-group">
                                <div class="input-group-prepend">
                                    <span class="input-group-text bg-transparent border-right-0 text-muted" style="border-radius: 8px 0 0 8px;"><i class="fas fa-lock"></i></span>
                                </div>
                                <input type="password" name="password" class="form-control border-left-0" placeholder="••••••••" style="border-radius: 0 8px 8px 0;" required>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary btn-block btn-login shadow-sm">
                            Iniciar Sesión <i class="fas fa-arrow-right ml-2"></i>
                        </button>
                    </form>
                </div>
            </div>
            
            <p class="text-center text-white-50 small mt-4">
                &copy; 2026 Control de Interfaces G7
            </p>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
